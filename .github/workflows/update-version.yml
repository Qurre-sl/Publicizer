name: Update Version and Tag

on:
  push:
    branches: [main]

jobs:
  update_version:
    if: startsWith(github.event.head_commit.message, 'release: ')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract version from commit message
        id: extract_version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | sed -n 's/^release: //p')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update AssemblyInfo.cs
        run: |
          sed -i "s/AssemblyVersion(\".*\")/AssemblyVersion(\"${{ steps.extract_version.outputs.version }}\")/g" AssemblyInfo.cs
          sed -i "s/AssemblyFileVersion(\".*\")/AssemblyFileVersion(\"${{ steps.extract_version.outputs.version }}\")/g" AssemblyInfo.cs

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add AssemblyInfo.cs
          git commit -m "Update version to ${{ steps.extract_version.outputs.version }} [skip ci]"
          git push origin main

      - name: Create and push tag
        run: |
          git tag ${{ steps.extract_version.outputs.version }}
          git push origin ${{ steps.extract_version.outputs.version }}